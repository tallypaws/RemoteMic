<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Tauri + SvelteKit + Typescript App</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="loadingdiv"></div>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>

<style>
	body {
		background: none;
	}

	html,
	body {
		width: 100%;
		height: 100%;
	}
	html,
	body {
		margin: 0;
		padding: 0;
	}
</style>
<style>
	#loadingdiv {
		position: fixed;
		top: 0;
		left: 0;
		width: 100%;
		height: 100%;
		background-color: #4b4b4b;
		display: flex;
		align-items: center;
		justify-content: center;
		z-index: 1000;
		transition: all 0.5s;
		opacity: 100%;
		border-radius: 1rem;
	}

	#loadingdiv.gone {
		opacity: 0%;
		pointer-events: none;
	}
</style>
